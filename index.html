<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sato Noob Overlay</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: Arial, Helvetica, sans-serif;
      background: #120f1c;
    }

    #bg {
      position: fixed;
      inset: 0;
      background-image: url('background.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    #veil {
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 18, 0.12);
      z-index: 1;
    }

    .panel {
      position: absolute;
      z-index: 2;
      border: 3px solid rgba(245, 200, 66, 0.9);
      border-radius: 14px;
      background: rgba(8, 10, 18, 0.16);
      box-shadow: 0 0 18px rgba(245, 200, 66, 0.10);
      backdrop-filter: blur(4px);
    }

    /*
      Proporção 2880x1800 = 16:10
      Escalonando para caber na altura de 1080:
      largura = 1080 * (2880/1800) = 1728px → muito largo
      Então limitamos pela largura disponível (~1380px) e calculamos a altura:
      altura = 1380 * (1800/2880) = 862px → também passa de 1080
      Solução: usar proporção 16:10 mas cabendo no layout real com margem:
      Gameplay: 1280px largura → altura = 1280 * (1800/2880) = 800px
    */
    #gameplay {
      left: 18px;
      top: 18px;
      width: 1344px;
      height: 840px;
    }

    /* Webcam — coluna direita, topo */
    #webcam {
      right: 18px;
      top: 18px;
      width: 390px;
      height: 220px;
    }

    /* Chat — abaixo da webcam, pequeno espaço entre eles */
    #chat {
      right: 18px;
      top: 252px;
      width: 390px;
      height: 546px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #chat-header {
      padding: 8px 12px;
      text-align: center;
      font-size: 17px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #20172d;
      background: linear-gradient(90deg, #ffd86b, #f4c842);
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    #chat-messages {
      flex: 1;
      padding: 10px;
      overflow: hidden;
    }

    /* Branding — abaixo da gameplay, canto inferior esquerdo */
    #branding {
      position: absolute;
      left: 18px;
      bottom: 16px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #branding img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(245, 200, 66, 0.9);
      background: rgba(10, 10, 18, 0.45);
      object-fit: cover;
    }

    #channel-name {
      padding: 7px 14px;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #ffd86b;
      background: rgba(10, 8, 18, 0.5);
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="bg"></div>
  <div id="veil"></div>

  <div id="gameplay" class="panel"></div>

  <div id="webcam" class="panel"></div>

  <div id="chat" class="panel">
    <div id="chat-header">CHAT</div>
    <div id="chat-messages" class="screen_div"></div>
  </div>

  <div id="branding">
    <img src="Image.png" alt="Logo Sato Noob" />
    <div id="channel-name">Sato Noob</div>
  </div>
</body>
</html>
