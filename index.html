<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sato Noob Overlay</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      position: relative;
      font-family: Arial, Helvetica, sans-serif;
      background: #120f1c;
    }

    /* Fundo com sua arte */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('background.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      z-index: 0;
    }

    /* Camada escura leve para deixar as caixas legíveis */
    #veil {
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 18, 0.12);
      z-index: 1;
    }

    .panel {
      position: absolute;
      z-index: 2;
      border: 3px solid rgba(245, 200, 66, 0.9);
      border-radius: 18px;
      background: rgba(8, 10, 18, 0.16);
      box-shadow: 0 0 20px rgba(245, 200, 66, 0.10);
      backdrop-filter: blur(4px);
    }

    /* Gameplay maior e com mais espaço */
    #gameplay {
      left: 35px;
      top: 35px;
      width: 1120px;
      height: 680px;
    }

    /* Webcam mais afastada da gameplay */
    #webcam {
      right: 35px;
      top: 35px;
      width: 390px;
      height: 240px;
    }

    /* Chat abaixo da webcam, com espaço entre os blocos */
    #chat {
      right: 35px;
      top: 300px;
      width: 390px;
      height: 415px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #chat-header {
      padding: 10px 12px;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #20172d;
      background: linear-gradient(90deg, #ffd86b, #f4c842);
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
    }

    #chat-messages {
      flex: 1;
      padding: 12px;
    }

    /* Logo + nome */
    #branding {
      position: absolute;
      left: 35px;
      bottom: 28px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #branding img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid rgba(245, 200, 66, 0.9);
      background: rgba(10, 10, 18, 0.45);
      object-fit: cover;
    }

    #channel-name {
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #ffd86b;
      background: rgba(10, 8, 18, 0.5);
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="bg"></div>
  <div id="veil"></div>

  <div id="gameplay" class="panel"></div>

  <div id="webcam" class="panel"></div>

  <div id="chat" class="panel">
    <div id="chat-header">CHAT</div>
    <div id="chat-messages" class="screen_div"></div>
  </div>

  <div id="branding">
    <img src="Image.png" alt="Logo Sato Noob" />
    <div id="channel-name">Sato Noob</div>
  </div>
</body>
</html>
